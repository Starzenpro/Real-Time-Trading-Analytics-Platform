version: '3.8'

services:
  api:
    build: .
    container_name: trading-api
    ports:
      - "8000:8000"
    environment:
      - AZURE_SQL_SERVER=${AZURE_SQL_SERVER}
      - AZURE_SQL_DATABASE=${AZURE_SQL_DATABASE}
      - AZURE_SQL_USER=${AZURE_SQL_USER}
      - AZURE_SQL_PASSWORD=${AZURE_SQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - trading-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - trading-network
    restart: unless-stopped

  worker:
    build: 
      context: .
      dockerfile: Dockerfile.worker
    container_name: trading-worker
    environment:
      - AZURE_EVENT_HUB_CONNECTION=${AZURE_EVENT_HUB_CONNECTION}
      - AZURE_STORAGE_CONNECTION_STRING=${AZ
