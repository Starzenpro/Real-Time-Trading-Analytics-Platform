groups:
  - name: trading_alerts
    interval: 30s
    rules:
      - alert: HighLatency
        expr: http_request_duration_seconds{quantile="0.9"} > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "90th percentile latency is above 1s for 5 minutes"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for 5 minutes"

      - alert: PipelineFailure
        expr: pipeline_success_rate < 0.95
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Pipeline failure rate high"
          description: "Pipeline success rate is below 95%"

      - alert: VaRExceeded
        expr: daily_pnl < portfolio_var_95
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "VaR threshold exceeded"
          description: "Daily P&L exceeds 95% VaR threshold"
